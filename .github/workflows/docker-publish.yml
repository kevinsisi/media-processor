name: Build and Push Docker Images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: kevin950805
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            image: media-processor-api
            context: .
            file: docker/api.Dockerfile
          - service: worker
            image: media-processor-worker
            context: .
            file: docker/worker.Dockerfile
          - service: web
            image: media-processor-web
            context: .
            file: docker/web.Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          build-args: |
            WHISPER_FAKE=1
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: false

      - name: Summary
        run: |
          echo "## Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service: \`${{ matrix.service }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
