name: Deploy Production

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_SERVER_IP: 100.83.112.20
  DEPLOY_PATH: D:/GitClone/_HomeProject/media-processor
  DOCKERHUB_USERNAME: kevin950805
  IMAGE_TAG: latest
  EXPECTED_MEDIA_STORAGE_DIR: G:/MediaStorage
  EXPECTED_PGDATA_DIR: G:/MediaStorage/pgdata

jobs:
  deploy-production:
    runs-on: [self-hosted, Windows, X64, media-processor-prod]
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Ensure deploy directory exists
        run: |
          New-Item -ItemType Directory -Force -Path "${env:DEPLOY_PATH}" | Out-Null

      - name: Sync docker-compose.yml to desktop
        run: |
          Copy-Item -LiteralPath "docker-compose.yml" -Destination (Join-Path "${env:DEPLOY_PATH}" "docker-compose.yml") -Force

      - name: Validate production volume mapping
        run: |
          $ErrorActionPreference = 'Stop'
          $envPath = Join-Path "${env:DEPLOY_PATH}" ".env"
          if (!(Test-Path -LiteralPath $envPath)) { throw 'Missing .env on deploy host; refusing to deploy because compose would fall back to local or named volumes.' }

          function Read-EnvValue([string]$Name) {
            $line = Get-Content -LiteralPath $envPath | Where-Object { $_ -match ('^' + [regex]::Escape($Name) + '=') } | Select-Object -Last 1
            if (-not $line) { return $null }
            return ($line -replace ('^' + [regex]::Escape($Name) + '='), '').Trim().Trim('"')
          }

          function Normalize-PathValue([string]$Value) {
            if (-not $Value) { return $null }
            return $Value.Replace('\', '/').TrimEnd('/')
          }

          $media = Normalize-PathValue (Read-EnvValue 'MEDIA_STORAGE_DIR')
          $pgdata = Normalize-PathValue (Read-EnvValue 'PGDATA_DIR')
          if ($media -ne "${env:EXPECTED_MEDIA_STORAGE_DIR}") { throw "MEDIA_STORAGE_DIR must be ${env:EXPECTED_MEDIA_STORAGE_DIR}, got '$media'" }
          if ($pgdata -ne "${env:EXPECTED_PGDATA_DIR}") { throw "PGDATA_DIR must be ${env:EXPECTED_PGDATA_DIR}, got '$pgdata'" }
          if (!(Test-Path -LiteralPath "${env:EXPECTED_MEDIA_STORAGE_DIR}")) { throw "Missing ${env:EXPECTED_MEDIA_STORAGE_DIR} on deploy host." }
          if (!(Test-Path -LiteralPath "${env:EXPECTED_PGDATA_DIR}")) { throw "Missing ${env:EXPECTED_PGDATA_DIR} on deploy host." }

      - name: Deploy via Docker Compose
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location -LiteralPath "${env:DEPLOY_PATH}"
          $env:DOCKERHUB_USERNAME = "${env:DOCKERHUB_USERNAME}"
          $env:IMAGE_TAG = "${env:IMAGE_TAG}"

          docker compose pull api web worker-analysis worker-editing worker-bgm
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          docker compose up -d --scale worker-editing=3 postgres redis api web worker-analysis worker-editing worker-bgm
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          docker compose ps
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Health check through web proxy
        run: |
          $expected = (Select-String -Path "pyproject.toml" -Pattern '^version = "([^"]+)"').Matches[0].Groups[1].Value
          for ($i = 1; $i -le 12; $i++) {
            $body = curl.exe -fsS "http://${env:DEPLOY_SERVER_IP}:8523/api/health"
            if ($LASTEXITCODE -eq 0) {
              $health = $body | ConvertFrom-Json
              if ($health.version -eq $expected) { exit 0 }
              Write-Host "Health version $($health.version), expected $expected"
            }
            Start-Sleep -Seconds 10
          }
          exit 1

      - name: Deployment Summary
        if: always()
        run: |
          "## Production Deployment Summary" >> $env:GITHUB_STEP_SUMMARY
          "- Status: ${{ job.status }}" >> $env:GITHUB_STEP_SUMMARY
          "- Server: ${env:DEPLOY_SERVER_IP}" >> $env:GITHUB_STEP_SUMMARY
          "- Deploy path: ${env:DEPLOY_PATH}" >> $env:GITHUB_STEP_SUMMARY
          "- Media volume: ${env:EXPECTED_MEDIA_STORAGE_DIR}" >> $env:GITHUB_STEP_SUMMARY
          "- Postgres volume: ${env:EXPECTED_PGDATA_DIR}" >> $env:GITHUB_STEP_SUMMARY
          "- Web health: http://${env:DEPLOY_SERVER_IP}:8523/api/health" >> $env:GITHUB_STEP_SUMMARY
