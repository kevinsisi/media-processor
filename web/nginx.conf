server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Docker service IPs can change when the API container is recreated. Resolve
  # the upstream through Docker DNS at request time instead of pinning a stale IP.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;
  set $api_upstream api:8000;

  # Chunked-upload PUTs are bounded by the frontend's DEFAULT_CHUNK_SIZE
  # (4 MiB, see web/src/upload/chunked.ts). 64m gives generous headroom
  # for future chunk-size bumps without re-deploying nginx.
  client_max_body_size 64m;

  # The SPA shell must revalidate on every visit. Otherwise browsers can keep
  # loading an old index.html that points at old JS/CSS chunks after deploy.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    try_files /index.html =404;
  }

  # Vite emits content-hashed assets, so these can be cached aggressively once
  # index.html itself is kept fresh.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Stream large PUT bodies straight to the API rather than buffering
    # to nginx's temp dir first; matters for slow mobile uplinks.
    proxy_request_buffering off;
    proxy_http_version 1.1;

    # Slow mobile uploads of multi-MiB chunks can blow the 60s defaults.
    client_body_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    try_files $uri $uri/ /index.html;
  }
}
